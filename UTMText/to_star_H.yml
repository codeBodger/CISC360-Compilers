formalism: nesting minimising
start state: to star H
# to* H (15 states = 1 + 7 + 9 - 2, same structure as to H).
# Per Samhain's marginal note on p.3: "to* H is identical to to H,
# just with THIS as verify" — where THIS = the verify variant drawn
# below read γ on p.3 bot-left (the q'/γ' with σ0/σ0,R self-loops
# and paths yes/no via to front of dub).
#
# The "this" verify has 9 states. I've named it `verify γ before H`
# (to distinguish from `verify γ' placed before H`).
#
# flag: I'm not 100% sure "this" verify wasn't already one of the
# existing subroutines. If it's a new one, it needs its own file.
table:
  to star H:
    - "shift dub R":
        alpha: [verify wrap, R]
  verify wrap:
    - "verify γ before H":
        no epsilon: to star H
        yes epsilon: done
  done:
