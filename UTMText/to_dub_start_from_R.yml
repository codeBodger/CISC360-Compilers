formalism: nesting minimising
start state: through sings
# to dub start from R (4 states). Source: UTM.pdf p.4 top.
# "puts read head just to left of dub, assuming we're R of dub"
# The ⊦ reject-node was crossed out in the PDF; the ⊦ arrow re-routes
# via the curve to the pre-done step (confirmed by Samhain).
# The γ/γ,R → γ/γ,L bounce lands head on the first element of the dub.
table:
  through sings:
    alpha: [L]                      # α/α,L — skip single bits
    alpha_0: [to front of dub, L]   # α0/α0,L — found right end of dub
    alpha_1: [to front of dub, L]   # α1/α1,L — found right end of dub
    '[': [pre_done, R]              # ⊦/⊦,R — re-routed curve to pre-done
  to front of dub:
    alpha_beta: [L]                 # αβ/αβ,L — walk through dub
    gamma: [pre_done, R]            # γ/γ,R — stepped off dub onto non-dub
  pre_done:
    gamma: [done, L]                # γ/γ,L — final L to sit on first dub elem
  done:

