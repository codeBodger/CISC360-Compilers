formalism: nesting minimising
start state: to H
# to H (15 states = 1 + 7 + 9 - 2). Source: UTM.pdf p.6 bot.
# Chains: shift dub R subroutine, then verify γ' placed before H;
# if verify says no, loop back to shift dub R; if yes, done.
#
# flag: the transit label from `shift dub R` exit to `verify γ'
# placed before H` reads as `α/α,R` in my zoom; could be `σ/σ,R`.
table:
  to H:
    - "shift dub R":
        alpha: [verify wrap, R]       # α/α,R — flag unsure α vs σ
  verify wrap:
    - "verify γ' placed before H":
        no epsilon: to H              # loop: shift again
        yes epsilon: done
  done:
