formalism: nesting minimising
start state: read gamma
# read γ (33 states = 7 + 12 + 15 - 1). Source: UTM.pdf p.3 bot.
# Reads the current γ (tape symbol at the simulated TM's head position).
# Uses `to left` (12 states) and `to* H` (15 states — same structure as
# `to H` but uses a different verify subroutine per Samhain's marginal
# note).
#
# flag: this is one of the harder diagrams; my transcription of the
# middle section (q → γ → del/rem γ → back to H) is best-effort.
# The `HO/H,R` re-label transition from γ to del is particularly unclear.
table:
  read gamma:
    - to left
    - "to* H":
        gamma: [q, R]      # γ/γ,R transit (flag: could be αβ)
  q:
    alpha_0: [R]           # αβ0/αβ0,R self-loop (flag)
    '00': [R]
    '11': ["γ state", R]
    '#1': ["γ state", R]
  "γ state":
    '0': ['00', R]         # 0/00,R — mirror dubify-like action
    'H': [back to H, L]    # H/H,L — found H marker
    'H0': [del rem γ, 'H', R]  # H0/H,R — begin erasure
  del rem γ:
    sigma: [R]             # σ/σ,R self-loop (flag)
    gamma: [back to H, L]
  back to H:
    sigma: [L]             # σ/σ,L self-loop (flag)
    'H': [pre_done, L]
  pre_done:
    gamma: [done, R]
  done:

# `to* H` is a separate subroutine — see its own file (to_star_H.yml)
