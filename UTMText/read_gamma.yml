table:
  S:
    - to left
    - "to star H":
        gamma: [q, R]      # γ/γ,R transit (resolved: could be αβ) Nope!
  q:
    alpha_0: [R]           # αβ0/αβ0,R self-loop (resolved) huh??
    '11': ["γ state", R]
    '#1': ["γ state", R]
  "γ state":
    '0': ['00', R]         # 0/00,R — mirror dubify-like action
    '00': [R] # SRA: moved from in `q`; made no sense there
    'H': [to front of dub, L]    # H/H,L — found H marker
    'H0': [del rem γ, 'H', R]  # H0/H,R — begin erasure
  del rem γ:
    sigma_0: [sigma, R]             # σ/σ,R self-loop (resolved: σ*0*/σ,R)
    gamma: [back to H, L]
  back to H:
    sigma: [L]             # σ/σ,L self-loop (resolved)
    'H': [to front of dub, L]
  to front of dub:
    ['01', '#1', '11', '00']: [L]
    gamma: [{gamma: [done, R]}, L]
