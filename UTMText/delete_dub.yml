formalism: nesting minimising
start state: start
# delete dub (3 states). Source: UTM.pdf p.6 mid.
# De-dubs: converts dub tape symbols (11, 00) back to singles.
# Precondition: only 00 and 11 dubs appear in this region (per Samhain).
table:
  start:
    '1': [del, R]           # 1/1,R — skip leading sentinel
    '0': [del, R]           # 0/0,R — skip leading sentinel
  del:
    '11': ['1', R]          # 11/1,R — rewrite dub as single, move R
    '00': ['0', R]          # 00/0,R — rewrite dub as single, move R
    '1': [done, R]          # 1/1,R — hit trailing sentinel, done
  done:
