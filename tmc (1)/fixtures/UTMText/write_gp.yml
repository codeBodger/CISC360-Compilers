formalism: nesting minimising
start state: q'
# write γ' (11 states = 8 + 4 - 1). Source: UTM.pdf p.3 top.
# Uses `to dub start from R` as a subroutine. Writes the new γ' tape
# symbol onto the tape at the H-marked position. Uses α-relabeling.
#
# flag: this diagram is very dense. My reading of the interior transit
# labels is best-effort; please review carefully.
table:
  q':
    '10': [R]
    '00': [R]
    '#0': [R]
    '11': ["γ'", R]
    '#1': ["γ'", R]
  "γ'":
    '00': [R]
    '01': [del, R]
    'H0': [seen H, '00', R]
    'H1': [done, R]    # flag: H1 transit uncertain
  del:
    alpha_beta: [R]
    gamma: [move, L]   # flag: del exit uncertain
  move:
    gamma: ["seen alpha to alpha'", R]  # flag: uncertain
  seen H:
    alpha_beta: ["seen alpha to alpha'", Hβ, R]
  "seen alpha to alpha'":
    alpha_beta: ["alpha'β", R]
    # ⊔/⊔,L — then enter to dub start from R, then done
    ' ': [["to dub start from R", done], L]
  done:
