formalism: nesting minimising
start state: q'
# verify γ' placed before H (9 states). Source: UTM.pdf p.6 bot-right.
# Scans R looking for H markers; yes-path if we find H before γ', no-path
# otherwise.
#
# flag: this diagram is very dense with transit labels. I'm confident
# about the yes-path structure but the no-path has a through-σs loop
# with labels I had to partially guess at. Please review.
table:
  q':
    '10': [R]           # 10/10,R self-loop
    '00': [R]           # 00/00,R self-loop
    '#0': [R]           # #0/#0,R self-loop
    '11': ["γ'", R]     # 11/11,R — step forward
    '#1': ["γ'", R]     # #1/#1,R — step forward
  "γ'":
    '0': [R]            # 0/0,R self-loop
    '01': [R]           # 01/01,R self-loop
    '00': [R]           # 00/00,R self-loop
    # yes-path: hit H-marker
    'H0': [yes_tfd, L]
    'H1': [yes_tfd, L]
    'H': [yes_tfd, L]
    # no-path: hit the wrong char before H
    '1': [no_tfd, '#1', L]    # flag: uncertain rewrite
    '#0': [no_tfd, '10', L]   # flag: uncertain rewrite
    '#1': [no_tfd, '11', L]   # flag: uncertain rewrite
  yes_tfd:
    '11': [L]
    '00': [L]
    '10': [L]
    gamma: [yes_pre, R]
  yes_pre:
    gamma: [yes, L]
  no_tfd:
    '10': [L]
    '00': [L]
    '#0': [L]
    '11': [L]
    alpha_beta: [through σs, L]   # flag: uncertain transit
    gamma: [no_pre, R]
  "through σs":
    '0': [L]
    gamma: [no_pre, R]
  no_pre:
    gamma: [no, L]
  yes:
  no:
