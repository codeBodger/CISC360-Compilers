formalism: nesting minimising
alphabet: ['0', '1']
tape symbols: ['0', '1', '[', ' ']
left: '['
blank: ' '
# Here, there is no pseudo (not an actual concept; a state is a state) start
# state, resulting in an additional epsilon transition in need of elimination,
# and thereby a longer start state name in the compiled version.
start state: [shift, "2sc"]
reject: reject
accept: accept
